# Deploy Vite app to GitHub Pages (https://swac-vis.github.io/africapolis/)
# Requires: repo secret VITE_MAPBOX_KEY, and Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          VITE_BASE: '/africapolis/'
        run: npm run build

      # GitHub Pages has no SPA fallback: /data/map etc. would 404. Serve index.html as 404
      # so the client-side router can handle the URL.
      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
